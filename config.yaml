main:
  components_repository: "components"
  project_name: nyc_airbnb
  experiment_name: development
  steps: all
  env_manager: local
  sample: "sample.csv"   # REQUIRED FOR HYDRA OVERRIDES

etl:
  sample: "sample.csv"
  sample_artifact: "sample.csv"
  clean_sample_artifact: "clean_sample.csv"
  clean_sample_type: "clean_sample"
  clean_sample_description: "Cleaned sample data"
  trainval_artifact: "trainval.csv:latest"
  min_price: 10
  max_price: 350

data_check:
  kl_threshold: 0.2

modeling:
  test_size: 0.2
  val_size: 0.2
  random_seed: 42
  stratify_by: "neighbourhood_group"
  max_tfidf_features: 5

  random_forest:
    n_estimators: 100
    max_depth: 15
    min_samples_split: 4
    min_samples_leaf: 3
    n_jobs: -1
    criterion: squared_error
    max_features: 0.5
    oob_score: true